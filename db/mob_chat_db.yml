Header:
  Type: MOB_CHAT_DB
  Version: 1

Body:
  - Id: 1
    Dialog: อ่อนแอ! ถ้ามีความกล้าก็ลองท้าทายข้าสิ!
  - Id: 2
    Dialog: น่าประทับใจ! ข้าอยากรู้ว่าความบ้าบิ่นของเจ้าจะพาเจ้าไปได้ไกลแค่ไหน!
  - Id: 3
    Dialog: ข้าแทบสงสารเจ้าที่ไร้หนทางสู้กับข้าเลย... เตรียมตัวรับการโจมตีของข้าได้แล้ว!
  - Id: 4
    Dialog: ข้าขอเรียกข้ารับใช้ของข้า! ต้อนรับพวกมันด้วยความตายอันเจ็บปวด!
  - Id: 5
    Dialog: อย่าคิดหนีไป!
  - Id: 6
    Dialog: เจ้าพวกมนุษย์ไร้ค่า... พลังศักดิ์สิทธิ์ของพวกเจ้าทำอะไรข้าไม่ได้!
  - Id: 7
    Dialog: ลูกกระจ๊อกไร้ประโยชน์!... แต่ก็ไม่เป็นไร ข้ายังมีอาวุธอีกมากมายให้ใช้และโยนทิ้ง!
  - Id: 8
    Dialog: สวดภาวนาให้พระเจ้าของเจ้าซะ!
  - Id: 9
    Dialog: เจ้าคิดว่ายังมีโอกาสสู้กับข้าอีกงั้นหรือ?!
  - Id: 10
    Dialog: จงหายไปซะ!
  - Id: 11
    Dialog: มาดูกันว่าเจ้าจะทนพลังของข้าได้นานแค่ไหน!
  - Id: 12
    Dialog: แค่นี้เองหรือ?!
  - Id: 13
    Dialog: เจ้ากำลังจั๊กจี้ข้าอยู่หรือไง?!
  - Id: 14
    Dialog: นี่น่ะเหรอการโจมตีของเจ้า? ดูและเรียนรู้ซะ พวกอ่อนแอ!
  - Id: 15
    Dialog: ได้เวลาปิดฉากเกมนี้แล้ว!
  - Id: 16
    Dialog: โอ้... แข็งแกร่งกว่าที่ข้าคิดไว้นี่นา!
  - Id: 17
    Dialog: ไม่! เป็นไปไม่ได้! ข้าคือ ซาตาน มอร็อค ราชันแห่งการทำลายล้าง!
  - Id: 18
    Dialog: ข้าไม่มีวันตาย! ข้าจะกลับมาเอาคืนเจ้าแน่!
  - Id: 19
    Dialog: ข้าเกิดมาเพื่อพิชิตโลกนี้! ไม่มีใครขวางข้าได้!
  - Id: 20
    Dialog: วันเวลาของเจ้ากำลังจะหมดลงแล้ว!
  - Id: 21
    Dialog: พัลส์สไตรค์! นิ้วของข้าสามารถฉีกเหล็กได้!
  - Id: 22
    Dialog: ฮ่าฮ่าฮ่า! บอกข้ามาสิว่าข้าเป็นใคร! ข้าคือ บาโฟเมต ทายาทแห่งนรก!
  - Id: 23
    Dialog: สนุกกับชีวิตมนุษย์ของเจ้าให้เต็มที่ อีกไม่นานความหวังของเจ้าจะกลายเป็นความสิ้นหวัง!
  - Id: 24
    Dialog: เมื่อไหร่เจ้าถึงจะเรียนรู้บทเรียนนี้? หรือเจ้าต้องตายก่อน?
  - Id: 25
    Dialog: ไม่... ข้าไม่มีวันแพ้! ข้าจะไม่ขอชีวิต! ข้าไม่หนี! ข้าไม่ยอมรับความพ่ายแพ้!
  - Id: 26
    Dialog: อ้าก... ข้า... กำลังอ่อนแรง...
  - Id: 27
    Dialog: เจ้าต้องการอะไรจากข้า?
  - Id: 28
    Dialog: ไม่! ข้าไม่ได้ทำเรื่องนี้! เขาต่างหากที่เป็นคนวางแผนทุกอย่าง!
  - Id: 29
    Dialog: ข้าแค่อยากพบกับความสงบ... นั่นเป็นเหตุผลที่ข้าหลบหนีมาตลอด!
  - Id: 30
    Dialog: อ๊ากกกก!!! ตอนนี้ข้าต้องฆ่าพวกเจ้าทุกคน!
  - Id: 31
    Dialog: เจ้าแมลงน่ารำคาญ!! ออกไปจากตัวข้า!
  - Id: 32
    Dialog: จงทนทุกข์ในนรกซะ!
  - Id: 33
    Dialog: มวะฮ่าฮ่า! จงลิ้มรสพลังแห่งความโกรธเกรี้ยวของผืนดิน!
  - Id: 34
    Dialog: ไม่... ข้าไม่ยอมรับว่าข้าแพ้!
  - Id: 35
    Dialog: การทำร้ายข้าช่วยบรรเทาความเหงาของเจ้าหรือไม่? ทำไมไม่อยู่ที่นี่กับข้าตลอดไปล่ะ มนุษย์?
  - Id: 36
    Dialog: เจ้าจะลืมแม้แต่ความหมายของเวลา... ข้าอยากรู้จริง ๆ ว่าเจ้าจะอยู่ที่นี่ได้นานแค่ไหน...
  - Id: 37
    Dialog: มีใครรอเจ้าอยู่ภายนอกหรือเปล่า? ทิ้งพวกมันไปซะ เจ้าคือของข้าแล้ว...
  - Id: 38
    Dialog: ละทิ้งชีวิตของเจ้าแล้วอยู่ที่นี่ไปซะ! เจ้าจะโหยหาความอิสระในคุกแห่งนี้!!
  - Id: 39
    Dialog: โลกภายนอกจะเปลี่ยนไปแค่ไหน หากเจ้าถูกขังอยู่ที่นี่เป็นเวลาหนึ่งพันปี?
  - Id: 40
    Dialog: ใช่แล้ว! จงโหยหาอิสรภาพของเจ้าไปเถอะ! เพราะเจ้าจะไม่มีวันได้มันอีกแล้ว!
  - Id: 41
    Dialog: การมาถึง!
  - Id: 51
    Dialog: ข้าจะไม่มีวันให้อภัยมนุษย์!!
  - Id: 52
    Dialog: ข้าจะไม่มีวันให้อภัยมนุษย์!!
  - Id: 53
    Dialog: ข้าจะช่วยเจ้า!
  - Id: 54
    Dialog: ข้าจะช่วยเจ้า!
  - Id: 55
    Dialog: นี่แหละคือความจริง! ฮ่าฮ่าฮ่า!
  - Id: 58
    Dialog: โจมตี!
  - Id: 60
    Dialog: ไปเลย!! อัลตร้า คริทิคอล แบช EX !!
  - Id: 61
    Dialog: มาเลย!! ไฟร์บอลแห่งนรก!!
  - Id: 62
    Dialog: คุกเข่าต่อหน้าข้า!! นี่คือพลังอันยิ่งใหญ่ของระบบทุนนิยม!!
  - Id: 63
    Dialog: เจ้าหนีข้าไม่พ้น!! ดับเบิ้ลสเตรฟ ทะลวงศัตรูของข้า!!
  - Id: 64
    Dialog: ข้าจะทำให้เจ้าป่วย!! พิษร้ายแห่งคนละยุค Ultimate Envenom!!
  - Id: 65
    Dialog: ข้าจะบดขยี้เจ้า!! อัลติเมท ดีเครส อจิลิตี้ GX!!
  - Id: 67
    Dialog: ม่านแห่งความมืดที่บดบังทัศนวิสัย! จะลบล้างได้เพียงแค่ใช้กรีนโพชั่น!
  - Id: 68
    Dialog: พิษที่ลด HP อย่างต่อเนื่องในระยะเวลาหนึ่ง! แต่ใช้กรีนเฮิร์บไม่ได้ผล!
  - Id: 69
    Dialog: มาเริ่มจากการฟื้นฟูกันก่อน!
  - Id: 70
    Dialog: ความเงียบที่ทำให้ใช้สกิลไม่ได้! ทางเดียวที่จะหลุดพ้นคือการใช้กรีนโพชั่น!


