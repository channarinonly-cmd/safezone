  - Combos:
      - Combo:
          - Ignition_Helm
          - Ignition_Ring
    Script: |
      if (!getmapflag(strcharinfo(3), mf_pvp) && !getmapflag(strcharinfo(3), mf_gvg)) {
         
         // 🛑 แก้ไขชื่อคำสั่งให้ถูกต้องแล้วครับ
         bonus2 bSkillUseSP,"RK_IGNITIONBREAK",20; 
         
         bonus bDelayRate,-30;                        
         bonus2 bSkillCooldown,"RK_IGNITIONBREAK",-1000; 
         
         .@helm_r = getequiprefinerycnt(EQI_HEAD_TOP);
         if (.@helm_r >= 9) {
            bonus2 bSkillAtk,"RK_IGNITIONBREAK",150;
         } else if (.@helm_r >= 7) {
            bonus2 bSkillAtk,"RK_IGNITIONBREAK",100;
         } else if (.@helm_r >= 5) {
            bonus2 bSkillAtk,"RK_IGNITIONBREAK",50;
         }
         
         .@weap_r = getequiprefinerycnt(EQI_HAND_R);
         if (.@weap_r > 0) {
            bonus2 bSkillAtk,"RK_IGNITIONBREAK", 15 * .@weap_r;
         }
      }
      
  - Combos:
      - Combo:
          - Rolling_Hat2
          - Mob_Scarf_W
    Script: |
      // ดักแผนที่ PVP / GVG สำหรับความสามารถคอมโบ
      if (!getmapflag(strcharinfo(3), mf_pvp) && !getmapflag(strcharinfo(3), mf_gvg)) {
         
         // ดึงค่าการตีบวกของอาวุธที่ถือในมือขวามาคำนวณ
         .@weap_ref = getequiprefinerycnt(EQI_HAND_R);
         
         // ถ้ามีอาวุธและตีบวก 1 ขึ้นไป จะคูณสเตตัสตามขั้นการตีบวก
         if (.@weap_ref > 0) {
            bonus bBaseAtk, 10 * .@weap_ref;
            bonus2 bSkillAtk,"GC_ROLLINGCUTTER", 10 * .@weap_ref;
            bonus bShortAtkRate, 2 * .@weap_ref;
         }
      }
      
  - Combos:
      - Combo:
          - Scarlet_Bow     # 18130 Crimson Bow
          - Heaven_Cage2    # 8550020 Heaven Cage
    Script: |
      .@hat_ref = getequiprefinerycnt(EQI_HEAD_TOP);
      .@bow_ref = getequiprefinerycnt(EQI_HAND_R);
      
      // เช็คเงื่อนไข: ต้องตีบวก 9 ขึ้นไปทั้งหมวกและธนู คอมโบถึงจะทำงาน
      if (.@hat_ref >= 9 && .@bow_ref >= 9) {
        // คำนวณความแรง 80% ต่อขั้นการตีบวก
        .@bonus_hat = .@hat_ref * 80;
        .@bonus_bow = .@bow_ref * 80;
        
        .@total_bonus = .@bonus_hat + .@bonus_bow;
        
        if (.@total_bonus > 0) {
          bonus2 bSkillAtk,"HT_BLITZBEAT",.@total_bonus;
        }
      }