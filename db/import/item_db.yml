          if (@inventorylist_id[.@i] == 6000231) {
            .@has_combo = 1;
            if (@inventorylist_refine[.@i] > .@refine_combo) {
              .@refine_combo = @inventorylist_refine[.@i];
            }
          }
          // หาเครื่องรางชิ้นนี้ (35053) และเก็บค่าตีบวกที่สูงที่สุด
          if (@inventorylist_id[.@i] == 35053) {
            if (@inventorylist_refine[.@i] > .@refine_self) {
              .@refine_self = @inventorylist_refine[.@i];
            }
          }
        }
        
        // เงื่อนไข: ไอเทมคอมโบ 6000231 (+5 ขึ้นไป) และเครื่องรางนี้ต้องตีบวกอย่างน้อย +1
        if (.@has_combo && .@refine_combo >= 5 && .@refine_self > 0) {
          
          // 1. ให้เลเวลสกิลตาม "การตีบวกของเครื่องรางนี้" (สูงสุด Lv.10)
          .@skill_lv = .@refine_self;
          if (.@skill_lv > 10) .@skill_lv = 10;
          skill "KN_BOWLINGBASH", .@skill_lv;
          
          // 2. โบนัสความแรงสกิลตาม "การตีบวกของไอเทม 6000231" (เริ่มนับที่ +6)
          if (.@refine_combo >= 6) {
            .@bonus_dmg = (.@refine_combo - 5) * 10; // +6 = 10%, +7 = 20%, ...
            
            // ล็อคโบนัสความแรงสูงสุดไว้ที่ 50% (ที่ +10) หากต้องการให้ทะลุ +10 ได้ ให้ลบบรรทัดล่างนี้ทิ้ง
            if (.@bonus_dmg > 50) .@bonus_dmg = 50; 
            
            bonus2 bSkillAtk, "KN_BOWLINGBASH", .@bonus_dmg;
          }
        }
      }
      
