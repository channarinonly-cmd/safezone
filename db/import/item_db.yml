#############Charm Upgrade V2#####
###############################
  - Id: 35050
    AegisName: Charm_Sonicblow2
    Name: Charm Steal
    Type: Charm_Upgrade
    Buy: 10
    Refineable: true
    Trade:
      NoDrop: true
      NoTrade: true
      NoSell: true
      NoCart: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    CharmScript: |
      // เช็คว่าเป็นตัวละครสายอาชีพพื้นฐานคือ Thief (รวมถึงคลาส 2, 3, 4 ในสายนี้)
      if (BaseJob == Job_Thief) {
        getinventorylist;
        .@refine1 = 0;
        .@refine2 = 0;
        .@has_charm1 = 0;
        
        // วนลูปเช็คไอเทมในกระเป๋า
        for (.@i = 0; .@i < @inventorylist_count; .@i++) {
          if (@inventorylist_id[.@i] == 6000229) {
            .@has_charm1 = 1;
            if (@inventorylist_refine[.@i] > .@refine1) {
              .@refine1 = @inventorylist_refine[.@i];
            }
          }
          if (@inventorylist_id[.@i] == 35050) {
            if (@inventorylist_refine[.@i] > .@refine2) {
              .@refine2 = @inventorylist_refine[.@i];
            }
          }
        }
        
        // หากเข้าเงื่อนไข: มีไอเทมชิ้นแรก, ชิ้นแรกตีบวก >= 5 และ ชิ้นที่สองตีบวก > 0
        if (.@has_charm1 && .@refine1 >= 5 && .@refine2 > 0) {
          .@skill_lv = .@refine2;
          
          if (.@skill_lv > 10) {
            .@skill_lv = 10;
          }
          
          // ให้สกิล Sonic Blow
          skill "AS_SONICBLOW", .@skill_lv;
          
          // --- โบนัสความแรง Sonic Blow ---
          if (.@refine1 >= 6) {
            .@bonus_refine = .@refine1;
            
            if (.@bonus_refine > 10) {
              .@bonus_refine = 10;
            }
            
            // เพิ่มโบนัสความแรงสกิล (รหัส 136 คือสกิล AS_SONICBLOW)
            bonus2 bSkillAtk, 136, ((.@bonus_refine - 5) * 10);
          }
        }
      }
  - Id: 35051
    AegisName: Charm_Magnus
    Name: Charm Magnus
    Type: Charm_Upgrade
    Buy: 10
    Refineable: true
    Trade:
      NoDrop: true
      NoTrade: true
      NoSell: true
      NoCart: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    CharmScript: |
      // เช็คว่าเป็นตัวละครสายอาชีพพื้นฐานคือ Acolyte
      if (BaseJob == Job_Acolyte) {
        getinventorylist;
        .@refine_combo = 0;
        .@refine_self = 0;
        .@has_combo = 0;
        
        // วนลูปเช็คไอเทมในกระเป๋า
        for (.@i = 0; .@i < @inventorylist_count; .@i++) {
          if (@inventorylist_id[.@i] == 6000230) {
            .@has_combo = 1;
            if (@inventorylist_refine[.@i] > .@refine_combo) {
              .@refine_combo = @inventorylist_refine[.@i];
            }
          }
          if (@inventorylist_id[.@i] == 35051) {
            if (@inventorylist_refine[.@i] > .@refine_self) {
              .@refine_self = @inventorylist_refine[.@i];
            }
          }
        }
        
        // เงื่อนไขหลัก: ต้องมีไอเทม 6000230 (+5 ขึ้นไป) และเครื่องรางชิ้นนี้ (+1 ขึ้นไป)
        if (.@has_combo && .@refine_combo >= 5 && .@refine_self > 0) {
          // 1. ให้สกิล Magnus Exorcismus ตามระดับการตีบวกของเครื่องราง (สูงสุด Lv.10)
          .@skill_lv = .@refine_self;
          if (.@skill_lv > 10) .@skill_lv = 10;
          skill "PR_MAGNUS", .@skill_lv;

          // 2. โบนัสความแรง Magnus Exorcismus (ขึ้นอยู่กับการตีบวกของไอเทม 6000230)
          if (.@refine_combo >= 6) {
            .@bonus_mag = .@refine_combo;
            if (.@bonus_mag > 10) .@bonus_mag = 10;
            // +6=10%, +7=20%, +8=30%, +9=40%, +10=50%
            bonus2 bSkillAtk, "PR_MAGNUS", ((.@bonus_mag - 5) * 10);
          }

          // 3. โบนัสความแรง Holy Light (ขึ้นอยู่กับการตีบวกของเครื่องราง 35051)
          if (.@refine_self >= 6) {
            .@bonus_holy = .@refine_self;
            if (.@bonus_holy > 10) .@bonus_holy = 10;
            // +6=10%, +7=20%, +8=30%, +9=40%, +10=50%
            bonus2 bSkillAtk, "AL_HOLYLIGHT", ((.@bonus_holy - 5) * 10);
          }
        }
      }
