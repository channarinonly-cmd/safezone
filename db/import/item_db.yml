    AegisName: Beginner_Red_Backpack
    Name: Beginner Red Backpack
    Type: Armor
    Weight: 200
    Defense: 20
    Slots: 1
    Locations:
      Garment: true
    ArmorLevel: 1
    Refineable: true
    View: 51
    Trade:
      NoDrop: true
      NoTrade: false
      NoCart: false
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    Script: |
      .@r = getrefine();
      if (.@r>=7) {
         skill "AC_CONCENTRATION",5;
         if (readparam(bStr)>=90) {
            bonus bBaseAtk,(.@r>=9)?30:20;
         }
         if (readparam(bInt)>=90) {
            bonus bMatk,(.@r>=9)?50:30;
         }
         if (readparam(bVit)>=90) {
            bonus2 bSubEle,Ele_Neutral,(.@r>=9)?10:5;
         }
         if (readparam(bAgi)>=90) {
            bonus bAspdRate,8;
            if (.@r>=9) {
               bonus bAspd,1;
            }
         }
         if (readparam(bDex)>=90) {
            bonus bLongAtkRate,(.@r>=9)?10:5;
         }
         if (readparam(bLuk)>=90) {
            bonus bCritAtkRate,(.@r>=9)?15:10;
         }
      }
