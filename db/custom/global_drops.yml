  - Name: Global Drop # ไม่มีความสำคัญ
    TargetItems:
      - Item: Elunium # ชื่อ AegisName
        Rate: 6 # % ดรอป , เลขสุ่ม drops.conf
        IsStamina: true # check stamina
        Announce: true # หากไม่กำหนด จะมีค่าเป็น false
        DropEffect: DROPEFFECT_BLUE_PILLAR # เสาดรอป
        MobLevelMin: 99 # เลเวลต่ำสุดของมอนสเตอร์
        MobLevelMax: 114 # เลเวลสูงสุดของมอนสเตอร์
  - Name: Global Drop # ไม่มีความสำคัญ
    TargetItems:
      - Item: Oridecon # ชื่อ AegisName
        Rate: 6 # % ดรอป , เลขสุ่ม drops.conf
        IsStamina: true # check stamina
        Announce: true # หากไม่กำหนด จะมีค่าเป็น false
