// rAthena Voice Server configuration file. 
//
// Note: "Comments" are all text on the right side of a double slash "//"
// Whatever text is commented will not be parsed by the server, and serves
// only as information/reference.

// The voice server listens on the interface with this IP address.
bind_ip: 0.0.0.0

// Voice WebSocket port for clients.
voice_port: 7000

// Voice bridge/API port for rAthena server-side integration.
voice_api_ip: 43.229.151.208
voice_api_port: 7001
voice_bridge_secret: f4d56919bbe59387359d5f5de210b52c4172c91ebba2d89e

// Proximity range in cells.
// full_range = hear at 100% volume
// max_range  = hear nothing
proximity_full_range: 1
proximity_max_range: 14

// Proximity cache update interval (milliseconds)
proximity_update_ms: 50

// Whisper session timeout (seconds, 0 = no timeout)
whisper_timeout: 300

// Voice scaling guard.
// Limits are per one speaker packet. 0 = unlimited.
voice_max_targets_normal: 64
voice_max_targets_group: 128
voice_max_targets_room: 64

// Drop voice frames to slow clients when their socket buffer grows too much.
// Dropping a few voice frames is safer than letting server memory grow.
voice_audio_backpressure_kb: 128

// Hat effect shown on a character while they are speaking.
// Use 0 to disable.
voice_speaking_hat_effect: HAT_EF_MIC
voice_speaking_hat_timeout_ms: 900

// Guild War voice mode.
// When enabled and map-server reports active War maps, Normal and Room voice
// are blocked there. Party/Guild stay enabled. Whisper is configurable.
voice_war_mode_enabled: 1
voice_war_allow_whisper: 1

// Voice license requirement.
// 0 = anyone can use voice (free for everyone)
// 1 = require an active voice_licenses entry (granted via item or @voicegrant)
voice_license_required: 0

// Player block list options.
// voice_block_bidirectional: 1 = when A blocks B, neither hears the other.
//                            0 = asymmetric (only A stops hearing B).
voice_block_bidirectional: 0
voice_block_alert_threshold: 0
voice_ignore_sync: 0

// Log level: 0=none 1=error 2=info 3=debug
log_level: 2

// Shared secret with client DLL. Empty = disabled.
voice_client_secret: f4d56919bbe59387359d5f5de210b52c4172c91ebba2d89e

// Anti-spoof: verify the client's login_id1 against the map-server advisory.
// Kept disabled in conf/import/voice_conf.txt until this 2023 client has a
// confirmed LOGIN_ID1 offset.
voice_login_id1_strict: 1

import: conf/import/voice_conf.txt
