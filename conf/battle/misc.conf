//--------------------------------------------------------------
// rAthena Battle Configuration File
// Originally Translated by Peter Kieser <pfak@telus.net>
// Made in to plainer English by Ancyker
//--------------------------------------------------------------
// Note 1: Value is a config switch (on/off, yes/no or 1/0)
// Note 2: Value is in percents (100 means 100%)
// Note 3: Value is a bit field. If no description is given,
//         assume unit types (1: Pc, 2: Mob, 4: Pet, 8: Homun, 16: Mercenary, 128: NPC, 512: Elemental)
//--------------------------------------------------------------

// PK Server Mode.  Turns entire server pvp(excluding towns). Experience loss is doubled if killed by another player.
// When players hunt monsters over 20 levels higher, they will receive 15% additional exp., and 25% chance of receiving more items. 
// There is a nopvp.txt for setting up maps not to have pk on in this mode.  Novices cannot be attacked and cannot attack.
// Normal pvp counter and rank display are disabled as well.
// Note: If pk_mode is set to 2 instead of 1 (yes), players will receive a 
//   manner penalty of 5 each time they kill another player (see manner_system 
//   config to adjust how this will affect players)
pk_mode: 0

// Displays a message when the player enters a pk zone.
// Only during pk_mode (Note 1)
pk_mode_mes: yes

// Manner/karma system configuration. Specifies how does negative manner
// (red no chat bubble) affects players (add as needed):
//  0: No penalties.
//  1: Disables chatting (includes whispers, party/guild msgs, etc)
//  2: Disables skill usage
//  4: Disables commands usage
//  8: Disables item usage/picking/dropping
// 16: Disables room creation (chatrooms and vending shops)
manner_system: 15

// For PK Server Mode. Change this to define the minimum level players can start PK-ing
pk_min_level: 55

// For PK Server Mode. It specifies the maximum level difference between
// players to let them attack each other. 0 disables said limit.
pk_level_range: 0

// For PK servers. Damage adjustment settings, these follow the same logic
// as their WoE counterparts (see guild.conf)  
pk_short_attack_damage_rate: 80
pk_long_attack_damage_rate: 70
pk_weapon_attack_damage_rate: 60
pk_magic_attack_damage_rate: 60
pk_misc_attack_damage_rate: 60

// Display skill usage in console? (for debug only) (default: off) (Note 3)
skill_log: off

// Display battle log? (for debug only) (default: off) (Note 1)
battle_log: off

// Display other stuff? (for debug only) (default: off) (Note 1)
etc_log: off

// Do you want to debug warp points? If set to yes, warp points will appear as flags.(Note 1)
// It will also run on start-up a warp-check to print out which warp points lead directly on 
// top of on-touch npcs (which can lead to infinite loopback warping situations)
warp_point_debug: no

// Choose if server begin with night (yes) or day (no)
night_at_start: no

// Define duration in msec of the day (default: 7200000 = 2 hours)
// Set to 0 to disable day cycle (but not @day GM command).
// Except 0, minimum is 60000 (1 minute)
day_duration: 0

// Define duration in msec of the night (default: 1800000 = 30 min)
// Set to 0 to disable night cycle (but not @night GM command).
// Except 0, minimum is 60000 (1 minute)
night_duration: 0

// Using duel on pvp-maps
duel_allow_pvp: no

// Using duel on gvg-maps
duel_allow_gvg: no

// Allow using teleport/warp when dueling
duel_allow_teleport: no

// Autoleave duel when die
duel_autoleave_when_die: yes

// Delay between using @duel in minutes
duel_time_interval: 60

// Restrict duel usage to same map
duel_only_on_same_map: no

// Determines max number of characters that can stack within a single cell. 
// Official - Only affects the walking routines of characters, including monsters.
// If a unit stops walking and is on a cell with more than stack limit
// characters on it, it will walk to the closest free cell.
// Set to 0 for no cell stacking checks and free movement.
// Custom - This variation will make every full cell to be considered a wall.
// NOTE: For the custom setting to take effect you have to use a server compiled
// with Cell Stack Limit support (see src/map/map.hpp)
official_cell_stack_limit: 1
custom_cell_stack_limit: 1

// Allow autotrade only in maps with autotrade flag?
// Set this to "no" to allow autotrade where no "autotrade" mapflag is set.
// Set this to "yes" to only allow autotrade on maps with "autotrade" mapflag.
at_mapflag: no

// Set this to the amount of minutes autotrade chars will be kicked from the server.
at_timeout: 0

// Makes player cannot be attacked when autotrade? (turns player's state.monster_ignore) (Note 1)
at_monsterignore: no

// Should autotrade trigger OnPCLogout script events? (Note 1)
at_logout_event: yes

// Auction system, fee per hour. Default is 12000
auction_feeperhour: 12000

// Auction maximum sell price
auction_maximumprice: 500000000

// Minimum delay between each store search query in seconds.
searchstore_querydelay: 10

// Maximum amount of results a store search query may yield, before
// it is canceled.
searchstore_maxresults: 30

// Whether or not gaining and loosing of cash points is displayed (Note 1).
// Default: no
cashshop_show_points: no

// Whether or not mail box status is displayed upon login.
// Default: 0
// 0 = No
// 1 = Yes
// 2 = Yes, when there are unread mails
mail_show_status: 0

// Amount of mails a user can send a day.
// Default: 100
// 0 = Unlimited
mail_daily_count: 100

// Fee for transferring zeny via mail (Note 2)
// NOTE: this rate is hardcoded in the client, you need to diff your client accordingly if you change this value.
// Default: 2(2%)
// 0 = No fee
mail_zeny_fee: 2

// Amount of zeny to pay for each attached item
// NOTE: this fee is hardcoded in the client, you need to diff your client accordingly if you change this value.
// Default: 2500
// 0 = No fee
mail_attachment_price: 2500

// Maximum weight in total that can be attached to a mail
// NOTE: this limit is hardcoded in the client, you need to diff your client accordingly if you change this value.
// Default: 2000
// 0 = No weight limit
mail_attachment_weight: 2000

// Is monster transformation disabled during Guild Wars?
// If set to yes, monster transforming is automatically removed/disabled when enterting castles during WoE times
mon_trans_disable_in_gvg: no

// Is item's price at item/point shop discountable?
// 0 = No (Default)
// 1 = Item shops
// 2 = Point shops
// 3 = Item & point shops
discount_item_point_shop: 0

// Don't display message "login-serv has been asked to %s the player '%.*s'." (Note 1)
disp_servervip_msg: no

// Delay to allow user resend new mail (default & minimum is 1000)
mail_delay: 1000

// Hides items from the player's favorite tab from being sold to a NPC. (Note 1)
hide_fav_sell: no

// Autoattack settings
// สกิลฮิว
autoattack_skillheal: on

// ยาปั้ม
autoattack_item_potion: on

// นั่งเพิ่มเลือด
autoattack_sittorest: on

// สกิลโจมตี
autoattack_skill_attack: on

// สกิลบัฟ
autoattack_skill_buff: on

// ยาบัฟ
autoattack_item_buff: on

// เทเลพอร์ท
autoattack_teleport: on

// เก็บของ
autoattack_item_pickup: on

// เลือกเป้าหมาย
autoattack_mselection: on

// ระยะตรวจหาไอเทมรวบๆ
autoattack_item_range_detection: 17

// ระยะตรวจหามอนสเตอร์
autoattack_mob_detection: 17

// ระยะเดิม
autoattack_move: 7

// รูปแบบการเดิน , 0 = สุ่มเดินมั่ว , 1 = เดินหน้าไปเรื่อยๆจนชนจุดที่เดินไม่ได้ จะเลี้ยว
autoattack_move_type: 1

// ระยะการทำงานของ Autoattack ต่อรอบ , หากปรับต่ำมากๆ จะทำให้หนักเซิร์ฟ , 1000-5000 ลองปรับดู
autoattack_interval_timer: 500

// ระยะเวลาที่ใช้ในการเก็บของแต่ละชิ้น
autoattack_pickup_delay: 500

// ยกเลิกสถานะเมื่อออกเกม , เมื่อกลับเข้าเกม Autoattack จะไม่ทำงาน
autoattack_clean_logout: no

// effect แสดงเมื่อเปิด auto attack , คนเปิดไม่เห็น , คนอื่นเห็น
autoattack_hateffect: 45

// กำหนด % การใช้สกิล หากไม่มีการตั้งค่า
autoattack_skill_rate_default: 10

// ลด drop เรท หากใช้ autoattack , 0 = ปิด , หน่วยเป็น %
autoattack_reduce_droprate: 50

// โหลดการปรับลด 0 = ปิด
// 1 healing
// 2 usable
// 4 etc + ammo
// 8 armor
// 16 weapon
// 32 card
autoattack_reduce_mode: 31

// กำหนด จำนวนสูงสุดในการกำหนดเป้าหมาย , ไม่ควรเกิน 20, ต้องลองปรับ เพราะมันจะมีการบัคชื่อไม่ขึ้น
autoattack_max_moblist: 20

// กำหนด จำนวนสูงสุดในการกำหนดไอเทมบัฟ
autoattack_max_itemlist: 20

// ลด % auto steal , 0 = ไม่ลด
autoattack_steal_reduce_rate: 50

// เล็งเป้ามอนตัวเดิมนานสุดเท่าไร 60000 = 1นาที , หากไม่ตายจะเดินหนี
autoattack_max_time_per_mob: 60000

// แก้ไขเรื่องล็อคมอนนานเกินไป , ควรตั้งให้น้อยกว่า autoattack_max_time_per_mob
autoattack_mob_struck: 10000

// ตัวเช็คการแกะซองธนูขั้นต่ำ
autoattack_quiver_check: 200

// กำหนด max รายชื่อมอนที่จะวิงหนี
autoattack_max_flee_mob: 10

// บังคับ coinflip 100% (บอทจะโยนเหรียญรัวๆจนครบ 10)
autoattack_gunslinger_conflip_fix: yes

// ปรับให้ coinflip ใช้ Zeny มากกว่าขึ้น เนื่องจาก fix 100%
autoattack_coinflip_coin: 5

// ระบุเลขครั้ง id จาก inter_server.yml
collection_storage_id: 1

// เปิดให้ได้ผล effect ของ collection
collection_enable_bonus: 1

// กำหนดโหมดให้ ผล effect
// 1 = เฉพาะแมปทั่วไป , ไม่ใช่ PvP , GvG
// 2 = เพาะ PvP , แมปธรรมดา + GvG ไม่ได้ผล
// 4 = เฉพาะ GvG , แมปธรรมดา + PvP ไม่ไดผล
// ผสมสูตรตามที่จะใช้ได้ , 1 , 2 , 3 , 4 , 5 , 6 , 7
collection_bonus_mode: 1

// ตั้งตามจำนวนคลังที่ตั้งใน inter_server.yml
max_collection_count: 600

// จำนวนที่จะฝากได้สูงสุดต่อชิ้น
collection_max_stored: 1

// ประกาศเมื่อตีบวกตี , 0 ปิด
refine_announce_success: 5

// ประกาศเมื่อตีบวกแหก , 0 ปิด
refine_announce_broken: 5

// ประกาศตีบวกสุ่มออฟ
refine_option_announce: yes

// กำหนดสี refine option Hex code ของประกาศ
refine_option_color: 0xFFFFFF

// กำหนดสี refine option Hex code
refine_option_color_self: 0xFFFFFF

// กำหนดสีประกาศตีบวกแหก
refine_broken_color: 0xFFFFFF

// กำหนดสีประกาศธรรมดา
refine_normal_color: 0xFFFFFF

// Vending Require
cashpoint_nameid: 30000

buy_vat: 10

// กำหนดราคาขายของสูงสุด หาก 0 จะเป็นราคาขายของเดิม
max_sale_etc: 10
max_sale_usable: 10
max_sale_healing: 10
max_sale_weapon: 5000
max_sale_armor: 5000
max_sale_card: 10

// โหมดการปิดดรอป
// 0 ปิดระบบ
// 1 healing
// 2 usable
// 4 etc + ammo
// 8 armor
// 16 weapon
// 32 card
// 1 + 2 + 4
disable_drop_type: 24

// ==========================================
// Custom Settings
// ==========================================
// เปิด-ปิด การดรอปไอเทมประเภทสัตว์เลี้ยง (0 = ดรอปปกติ, 1 = ปิดไม่ให้ดรอป)
// (รวมถึงไข่สัตว์เลี้ยง, ที่จับสัตว์, ชุดสวมใส่สัตว์เลี้ยง)
disable_pet_drops: 1

// 0 ปิดระบบ
// 1 มอนปกติ
// 2 มินิ
// 4 boss
disable_mob_type: 1


// char bonus debug
char_bonus_debug: no

// เปิดโหมด Magic สามารถติดคริได้
magic_critical: yes  

// Option 1 ติดคริ ด้วย status cri  Option 2 ติดคริด้วย script item       	
magic_critical_option: 1 

// โหมดการ ติดคริ MAP FLAG
// 1 MF_PVP
// 2 MF_GVG
// 4 MF_BATTLEGROUND
// สามารถบวกกันได้ เช่น  1 + 2 = 3 หมายถึง  MF_PVP และ   MF_GVG
magic_critical_flag: 1

// PK PASS SYSTEM
pk_pass: 1
pk_pass_attack_time: 3600 // duration status attacker ( key in second time unit )
pk_pass_protect_time: 14400 // duration status protector( key in second time unit )
pk_pass_attack_effect: 228   // Hat Effect ID Attacker
pk_pass_protect_effect: 229  // Hat Effect ID Protector 

// จำนวน IP ที่ต้องการบล็อก
ip_block_limit: 3

// ป้องกันการเปลี่ยน IP ( 1 = เปิดใช้งาน , 0 = ปิดใช้งาน )
// ระบบนี้จะตัดการเชื่อมต่อ IP เก่า เมื่อบัญชีมีการเปลี่ยนไปใช้ IP ใหม่ (ยกเว้นโหมดเปิดร้านอัตโนมัติ autotrade)
prevent_change_ip: 1

// ROPlay & VPN IP Whitelist (ใช้ลูกน้ำ , ในการคั่น IP กรณีมีหลายวง)
// หากมีหลายไอพีให้เว้นด้วยลูกน้ำ เช่น 111.111.111.111, 222.222.222.222
roplay_ip_whitelist: 168.222.60.98,1.47.135.129



// =============================================================
// Card Insert Blocker (per equip type)
// 1 = allow card insertion, 0 = block and show message
// =============================================================
card_insert_allow_armor: 0
card_insert_allow_head_top: 0
card_insert_allow_hand_l: 0
card_insert_allow_shoes: 0
card_insert_allow_garment: 0
card_insert_allow_hand_r: 0
card_insert_allow_acc_l: 0
card_insert_allow_acc_r: 0



// ==========================================
// Stock Market Quota Settings (ระบบตลาดหุ้น)
// ==========================================
// โควตาการขายขยะปั่นหุ้น ต่อคน / ต่อรอบ
sm_per_limit: 800

// โควตารับซื้อรวมของทั้งเซิร์ฟเวอร์ / ต่อรอบ
sm_server_limit: 10000





// Addon Cell PVP [Napster / Ported 2023]
// เปิดระบบ Deathmatch สำหรับ Cell PVP
// Default: 0
// 0 = No
// 1 = Yes
cellpvp_deathmatch: 1

// หน่วงเวลาก่อนที่ผู้เล่นจะเกิดใหม่ (Respawn) ในโหมด Deathmatch ของ Cell PVP
// Default: 1000 (1 secand)
cellpvp_deathmatch_delay: 1000

// อัตราการฟื้นฟู HP/SP ของผู้เล่นหลังจากตายในโหมด Cell PVP
// Default: 100 (recovery 100%)
deathmatch_hp_rate: 1
deathmatch_sp_rate: 1

// เปิดบัฟให้ผู้เล่นอัตโนมัติเมื่อเกิดใหม่ใน Cell PVP
// Default: 1
// 0 = No
// 1 = Yes
// ต้องใช้ไฟล์ NPC core ชื่อ "deathmatch_core"
cellpvp_autobuff: yes

// 0 = คนในปาร์ตี้เดียวกันตีกันไม่เข้า, 1 = ตีกันได้
// Default: 1
// 0 = No
// 1 = Yes
cellpvp_party_enable: 0

// 0 = คนในกิลด์เดียวกันตีกันไม่เข้า, 1 = ตีกันได้d
// Default: 1
// 0 = No
// 1 = Yes
cellpvp_guild_enable: 0

// เวลา (ms) ที่ห้ามเดินออกจากโซน PVP หลังจากโจมตี (ถ้าคุณใส่โค้ดส่วนนี้ไว้)
// Default: 5000 (5 secand)
cellpvp_walkout_delay: 5000

// เปิด-ปิด ระบบสงครามเมือง (1=เปิด, 0=ปิด)
city_faction_war: 1


//เปิดปิดตั้งร้านระหว่างเมือง 0ปิด/1เปิด
faction_vending_block: 0

// เรทแลกเปลี่ยนภาษี Cash เป็น Zeny เข้าคลังเมือง (1 Cash = กี่ Zeny)
stall_cash_to_zeny_tax_rate: 10000


// เปิดระบบบังคับขีดจำกัด Level มอนสเตอร์ (0 = ปิดระบบ, ใส่ตัวเลข = เลเวลสูงสุดที่ต้องการ)
// เหมาะสำหรับเซิร์ฟเวอร์ Renewal ที่ผู้เล่นตันเลเวล 99 เพื่อไม่ให้โดนหัก EXP/Drop
mob_max_level_cap: 114

// ==========================================
// Advanced Class Penalty System
// ==========================================
// เลือกประเภทมอนสเตอร์ที่จะใช้ระบบลงโทษ
// 1 = มอนสเตอร์ทั่วไป, 2 = มินิบอส, 3 = บอส MVP, 4 = ทั้งหมด
penalty_mob_type: 4

// ระบุ ID อาชีพที่ต้องการลงโทษ (คั่นด้วยลูกน้ำ ห้ามเว้นวรรค)
penalty_job_list: 3,4,5,11,19,20,4012,4019,4020

// อัตราการดรอปไอเทมเมื่ออาชีพใน List ข้างต้นเป็นคนสังหาร (100 = ปกติ, 50 = ลดครึ่งนึง, 0 = ไม่ดรอป)
penalty_drop_rate: 50

// ระยะสแกน (จำนวนช่อง) ที่ลูกน้องจะพุ่งเป้าไปหาอาชีพใน List ก่อน (0 = ปิดระบบ, แนะนำ: 15)
minion_hate_range: 0
